<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinitySolutions</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; overflow: hidden; }
        
        /* Button Style */
        .launch-btn { padding: 15px 35px; font-size: 20px; background-color: #ff69b4; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .launch-btn:active { transform: scale(0.95); }
        
        #content { display: none; animation: fadeIn 1.5s ease-in-out; padding: 20px; }
        .company-name { font-size: 36px; font-weight: bold; color: #003366; margin: 0; letter-spacing: 1px; }
        .tagline { font-size: 18px; color: #555; font-style: italic; margin-top: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="ribbonBox">
        <button class="launch-btn" onclick="revealCompany()">
            Click to Launch 🚀
        </button>
        <p style="color: #888; margin-top: 15px; font-weight: bold;">Surprise Inside!</p>
    </div>

    <div id="content">
        <h1 class="company-name">InfinitySolutions</h1>
        <p class="tagline">Limitless Growth</p>
    </div>

    <script>
        function revealCompany() {
            // Hides the button box and shows the company name
            document.getElementById('ribbonBox').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }
    </script>
</body>
</html>
